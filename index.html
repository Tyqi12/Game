<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racing Simulator - Competition Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #000;
            color: #0ff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #dashboard {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; pointer-events: none;
        }
        .gauge {
            background: rgba(0, 0, 0, 0.8); border: 2px solid #0ff; border-radius: 50%;
            width: 100px; height: 100px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #0ff; box-shadow: 0 0 15px #0ff;
        }
        #menu {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 8px; color: #fff; z-index: 10;
        }
        button { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; margin: 2px; }
        button:hover { background: #0ff; color: #000; }
        #mobile-controls {
            position: absolute; bottom: 20px; width: 100%; display: none;
            justify-content: space-between; padding: 0 30px; box-sizing: border-box;
        }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; user-select: none; }
    </style>
</head>
<body>

<div id="loading-screen">
    <h2>正在加载赛车资源...</h2>
    <p id="load-status">准备中</p>
</div>

<div id="menu">
    <div style="margin-bottom:8px"><b>车辆切换</b></div>
    <button onclick="switchVehicle(0)">Shift Tuner (Orange)</button>
    <button onclick="switchVehicle(1)">C7 Tuner (Orange)</button>
    <div style="margin: 10px 0 8px 0"><b>环境与天气</b></div>
    <select id="weatherSelect" onchange="updateEnvironment(this.value)">
        <option value="sunny">晴天 (Sunny)</option>
        <option value="rainy">雨天 (Rainy)</option>
        <option value="night">夜晚 (Night)</option>
    </select>
</div>

<div id="dashboard">
    <div class="gauge"><span style="font-size: 20px;" id="speed">0</span><span>KM/H</span></div>
</div>

<div id="mobile-controls">
    <div><div class="btn" id="btn-left">←</div><div class="btn" id="btn-right" style="margin-top:10px">→</div></div>
    <div><div class="btn" id="btn-gas">加速</div><div class="btn" id="btn-brake" style="margin-top:10px">刹车</div></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- 场景设置 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    sunLight.position.set(50, 100, 50);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // --- 地图生成 (根据图片描述) ---
    const groundGeo = new THREE.PlaneGeometry(1000, 1000);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a5e1a });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 灰色道路
    const roadGeo = new THREE.PlaneGeometry(20, 1000);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.y = 0.02;
    scene.add(road);

    // 建筑物 (白色区域)
    for(let i=0; i<30; i++) {
        const h = 10 + Math.random() * 20;
        const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshStandardMaterial({color: 0xffffff}));
        b.position.set(Math.random() > 0.5 ? 30 : -30, h/2, (Math.random()-0.5)*400);
        b.castShadow = true;
        scene.add(b);
    }

    // --- 车辆逻辑 ---
    let car = null;
    let velocity = 0;
    const loader = new GLTFLoader();
    const carFiles = ['Shift Tuner Orange.glb', 'C7 tuner car orange.glb'];

    window.switchVehicle = function(index) {
        document.getElementById('loading-screen').style.display = 'flex';
        if(car) scene.remove(car);
        
        loader.load(carFiles[index], (gltf) => {
            car = gltf.scene;
            car.traverse(c => { if(c.isMesh) c.castShadow = true; });
            scene.add(car);
            document.getElementById('loading-screen').style.display = 'none';
        }, (xhr) => {
            document.getElementById('load-status').innerText = Math.round(xhr.loaded / xhr.total * 100) + '%';
        }, (error) => {
            console.error('加载失败:', error);
            alert('模型加载失败，请确认文件名大小写！');
        });
    };

    // --- 环境逻辑 ---
    window.updateEnvironment = function(val) {
        if(val === 'rainy') {
            scene.fog = new THREE.Fog(0x666666, 1, 100);
            scene.background = new THREE.Color(0x666666);
        } else if (val === 'night') {
            scene.fog = new THREE.Fog(0x000000, 1, 50);
            scene.background = new THREE.Color(0x020205);
            sunLight.intensity = 0.1;
        } else {
            scene.fog = null;
            scene.background = new THREE.Color(0x87CEEB);
            sunLight.intensity = 1.2;
        }
    };

    // --- 操作逻辑 ---
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function update() {
        if(!car) return;

        if(keys['ArrowUp'] || keys['KeyW']) velocity += 0.005;
        if(keys['ArrowDown'] || keys['KeyS']) velocity -= 0.005;
        
        velocity *= 0.97; // 模拟阻力
        car.translateZ(velocity);

        if(keys['ArrowLeft'] || keys['KeyA']) car.rotation.y += 0.03 * (velocity > 0 ? 1 : -1);
        if(keys['ArrowRight'] || keys['KeyD']) car.rotation.y -= 0.03 * (velocity > 0 ? 1 : -1);

        document.getElementById('speed').innerText = Math.abs(Math.round(velocity * 500));

        // 相机跟随
        const camPos = new THREE.Vector3(0, 4, -10).applyMatrix4(car.matrixWorld);
        camera.position.lerp(camPos, 0.1);
        camera.lookAt(car.position.clone().add(new THREE.Vector3(0, 1, 0)));
    }

    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    // 默认加载第一辆车
    switchVehicle(0);
    animate();

</script>
</body>
</html>
